<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placares de Campanhas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF7; --panel: #FFFFFF; --line: #E4E2DA; --ink: #14213D; --ink-soft: #5B6478;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Inter', Arial, sans-serif; background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 40px 18px 60px; }
  h1 {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 26px; margin: 0 0 6px;
    text-transform: uppercase; letter-spacing: .3px; border-bottom: 3px solid var(--ink); padding-bottom: 16px;
  }
  .sub { font-size: 13px; color: var(--ink-soft); margin: 14px 2px 22px; }
  .campanha {
    display: block; background: var(--panel); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 18px 20px; margin-bottom: 12px; text-decoration: none; color: inherit;
  }
  .campanha-head { display: flex; align-items: center; gap: 10px; }
  .campanha.ativa { cursor: pointer; }
  .campanha.ativa:hover { border-color: var(--ink); }
  .campanha.em-breve { opacity: .55; cursor: default; }
  .nome { flex: 1; min-width: 0; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 18px; text-transform: uppercase; letter-spacing: .3px; }
  .desc { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }
  .tag {
    flex-shrink: 0; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    padding: 5px 10px; border-radius: 6px; white-space: nowrap;
  }
  .tag.ativa { background: #E6F0EA; color: #1E7145; }
  .tag.em-breve { background: #EEEDE7; color: var(--ink-soft); }
  .icon { font-size: 20px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Placares de Campanhas</h1>
  <div class="sub">Escolha a campanha para ver o andamento.</div>

  <a class="campanha ativa" href="campanha-varejo/">
    <div class="campanha-head">
      <div class="nome">Campanha VJ - AB Mauri, Ingleza e Panasonic</div>
      <span class="tag ativa">Em andamento</span>
    </div>
    <div class="desc">Panasonic · Ingleza · AB Mauri — placar, ranking e prêmios</div>
  </a>

  <a class="campanha ativa" href="vj-ingleza/">
    <div class="campanha-head">
      <div class="nome">Campanha VJ Ingleza</div>
      <span class="tag ativa">Em andamento</span>
    </div>
    <div class="desc">Ingleza — faixa de prêmio por atingimento de equipe (R$100 a R$400 por vendedor)</div>
  </a>
</div>
</body>
</html>
